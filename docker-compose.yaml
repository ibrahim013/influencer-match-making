services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: langgraph
      POSTGRES_DB: langgraph
    ports:
      - "5432:5432"
    volumes:
      - langgraph_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph -d langgraph"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://langgraph:langgraph@postgres:5432/langgraph
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-influencer-creators}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT:-}
      COMPETITOR_LIST: ${COMPETITOR_LIST:-Nike,Adidas,Puma}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  langgraph_pgdata:
